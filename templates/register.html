{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
<div class="center-page">
    <div class="card">
        <form action="/register" method="post">
            <div class="mb-3">
                <input autocomplete="new-username" autofocus class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text" required>
            </div>
            <div class="mb-3">
                <input autocomplete="new-password" class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password" required>
            </div>
            <div class = "mb-3">
                <input autocomplete="new-password" class="form-control mx-auto w-auto" name="confirmation" placeholder="Confirm Password" type="password" required>
            </div>
            <button class="btn btn-primary" type="submit">Register</button>
        </form>
        </div>
        </div>

{% endblock %}
