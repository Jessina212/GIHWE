{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
<div class="center-page">
    <div class="card">
    <form action="/login" method="post">
        <div class="mb-3">
            <input autocomplete="username" autofocus class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text" required>
        </div>
        <div class="mb-3">
            <input autocomplete="current-password" class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Log In</button>
    </form>

    <p>Don't have an account? <a href="/register">Register here</a></p>
    </div>
    </div>

{% endblock %}
